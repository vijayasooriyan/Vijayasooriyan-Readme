name: WakaTime Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger

jobs:
  update-readme:
    name: Update README with WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_LOC_CHART: "True"
          SHOW_PROJECTS: "False"
          SHOW_PROFILE_VIEWS: "False"
```

4. Click **"Commit changes"**

---

### **Step 5 — Run It Manually the First Time**

The schedule runs at midnight, but you can trigger it right now:

1. In your profile repo, click the **"Actions"** tab
2. In the left sidebar, click **"WakaTime Stats"**
3. Click **"Run workflow"** → **"Run workflow"** (green button)
4. Wait ~30 seconds → refresh the page
5. Go back to your profile README — the WakaTime section will now show your live stats

---

